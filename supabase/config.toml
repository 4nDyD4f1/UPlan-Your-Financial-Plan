# =============================================================================
# UPlan Finance Tracker - Supabase Local Development Configuration
# =============================================================================
# Project: UPlan - QRIS Spending Tracker for Gen Z Indonesia
# Docs: https://supabase.com/docs/guides/cli/config
# =============================================================================

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.receipts]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/heic", "application/pdf"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "uplan://auth/callback",
  "exp://127.0.0.1:19000/--/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 600

[auth.email.template.magic_link]
subject = "UPlan - Login Link 🔐"
content_path = "./templates/magic_link.html"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
skip_nonce_check = false

[auth.sessions]
timebox = 28800
inactivity_timeout = 10800

[analytics]
enabled = false
port = 54327
backend = "postgres"

[functions]
[functions.ocr]
verify_jwt = true

[functions.categorize]
verify_jwt = true

[functions.weekly-summary]
verify_jwt = false

[edge_runtime]
policy = "per_worker"
inspector_port = 8083
